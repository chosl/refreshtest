<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- The line below forces the page to refresh every 10 seconds -->
    <meta http-equiv="refresh" content="10">
    <title>Auto Refresh Simulator</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f6f9;
            color: #333;
            text-align: center;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 { margin-top: 0; color: #0070f3; }
        #timestamp { font-weight: bold; color: #666; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Page Refresh Simulator</h1>
        <p>This page automatically reloads every 10 seconds.</p>
        <p>Last loaded at: <span id="timestamp"></span></p>
        <p>Next refresh in: <span id="countdown">10</span>s</p>
    </div>

    <script>
        // Display the exact time the page loaded
        const now = new Date();
        document.getElementById('timestamp').innerText = now.toLocaleTimeString();

        // Visual countdown timer
        let timeLeft = 10;
        const countdownEl = document.getElementById('countdown');
        setInterval(() => {
            timeLeft--;
            if (timeLeft >= 0) {
                countdownEl.innerText = timeLeft;
            }
        }, 1000);
    </script>
</body>
</html>
